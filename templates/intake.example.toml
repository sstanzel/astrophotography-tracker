# =============================================================================
# intake.toml — capture-device import sources and rig mappings for intake.py
#
# Copy to _organization/intake.toml and edit. Everything device-, rig- and
# naming-specific lives HERE — intake.py carries none of it. See USAGE.md
# "Importing a capture night".
# =============================================================================

[intake]
# Where built session folders land. Empty = "<working library>/_sessions to
# organize" (the same staging folder preflight.py validates).
staging = ""

# Directory bundle copied opaquely into each new session as
# "<session>.pxiproject" — maintain this template yourself (swap it when
# PixInsight formats change or you want new process icons). Empty or missing
# path = skip, with a note in the plan. intake never edits its internals.
pxiproject_template = ""

# Digest used to verify every copy (sha256 | sha1 | md5).
hash = "sha256"

# ASIAir writes a Chinese duplicate of every Autorun log (*_CHN.txt).
copy_chn_logs = false

# The durable record of every verified copy. Empty =
# "_organization/intake_ledger.db". Primary state — never delete casually.
ledger = ""

# IANA timezone of the capture site. Filename stamps (ASIAir + NINA) are
# device-local and never need it; it only dates mtime-based frames — the
# "dslr" card-dump layout below. For an away-from-home card import (Iceland,
# …) set the trip's zone for that run, then set it back. The date is baked
# into the session folder name at --apply; changing it later means renaming.
timezone = "America/Denver"

# --- sources: one block per device dump root --------------------------------
# layout selects the walk profile: "asiair" (Autorun|Plan/Light/<Target>/...,
# flat Flat/ + Dark/ dumps, log/ folder), "nina" (<YYYY-MM-DD>/LIGHT|FLAT|
# DARK/... date folders), or "dslr" (bare camera-card dumps: CR3/NEF/... raw
# files with no metadata in their names — the night comes from each file's
# mtime via [intake] timezone, and the meaning from the dump folder's name:
# a folder named with calibration/dark/bias/flat tokens is a calibration
# dump (reported, never staged); any other folder name is read as the
# TARGET NAME and becomes a normal session. Example:
#
#   [[source]]
#   id     = "r5card"
#   label  = "Canon R5 card"
#   path   = "/Volumes/…/Astro_imports/R5"
#   layout = "dslr"
#
#   [[rig]]                    # raw names carry no camera token — key the
#   source = "r5card"          # rig on the source with camera = "*"
#   camera = "*"
#   scope  = "Redcat51"
#   sensor = "CanonR5"
# )

[[source]]
id     = "air2600"
label  = "ASIAir (2600 rig)"
path   = "/Volumes/…/Astro_imports/2600AIR EMCC_CCC"
layout = "asiair"

[[source]]
id     = "mele1"
label  = "Mele 1 (NINA)"
path   = "/Volumes/…/Astro_imports/Mele1_data/NINA"
layout = "nina"
# Optional: an extra folder walked entirely as a LOG directory, for setups
# whose guiding logs live outside the source root (PHD2 on a NINA PC writes
# wherever its "Log File Location" setting points — make sure the capture
# copy includes it). Guide/Autorun logs found here attach to the night's
# last session like any other log; PHD2_DebugLog files are ignored.
logs   = "/Volumes/…/Astro_imports/Mele1_data/PHD2"

# --- rigs: (source, camera token) → Scope + Sensor session tokens -----------
# camera matches the parsed filename token exactly ("2600MC",
# "Poseidon-C PRO", "QHYminiCam8M"); "*" matches any camera on that source.
# scope/sensor must be registry names (scope_values/, sensor_values/).
#
# Equipment swaps — the workflow is CLOSE OUT, don't edit:
#   1. Add `to = <last CIVIL night in the old configuration>` to the entry
#      that described the old reality (it becomes the dated history entry).
#      Civil night = the session-date convention: frames before local noon
#      belong to the previous evening's date, so a swap done during the day
#      closes out with the previous evening's date.
#   2. Add a new open-ended block for the new reality.
# Historical nights keep resolving correctly forever; swaps are additive
# config, never code. The same recipe covers an `adjacent` role change.
#
# Mechanics: from/to are TOML dates bounding the CIVIL NIGHT, inclusive;
# either may be omitted. A dated entry in range beats the open-ended entry
# for the same (source, camera). Overlapping dated ranges are a config
# error. Every plan prints which rule fired per session — `(open-ended
# rule)` vs `(dated rule … → date)` — so a wrong bound is visible on the
# exact nights it affects, before any --apply.
#
# adjacent = true appends "_adjacent" to the target token (second-rig
# sessions shot on a field next to the main target — see preflight.py).

[[rig]]
source = "air2600"
camera = "2600MC"
scope  = "RASA8"
sensor = "ASI2600MCAir"

[[rig]]                       # example: this camera was on another scope
source = "air2600"            # earlier in the year
camera = "2600MC"
scope  = "Pleiades111"
sensor = "ASI2600MCAir"
to     = 2026-04-18

[[rig]]
source = "mele1"
camera = "Poseidon-C PRO"
scope  = "Pleiades111"
sensor = "PoseidonCPro"
