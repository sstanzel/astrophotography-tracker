# =============================================================================
# Astrophotography tracker - configuration
# =============================================================================
# The only thing that changes between machines: where the capture libraries are.
# Everything else (the _organization folder, locations.toml, the registry) is
# found relative to where the scripts live, so it never needs configuring here.
#
# Add one [[library]] block per capture library. Order does not matter.
# A library whose `path` is not currently mounted is simply skipped on a run -
# it stays listed here so it is picked up again once the drive is reconnected.
#
#   id    - short label, used as the library_id in the database (no spaces)
#   path  - absolute path to the library's top folder
#   label - human-readable name (optional; defaults to id)
#   role  - "working" or "archive" (optional; defaults to "working")
#
# All values must be in double quotes.
#
# To add a third library (e.g. an external SSD), copy a block:
#   [[library]]
#   id    = "ssd"
#   path  = "/Volumes/MySSD/Astrophotography"
#   label = "Portable SSD"
#   role  = "archive"
#
# To share these scripts with someone else, they just edit the paths below.
# =============================================================================

[[library]]
id    = "stream"
path  = "/Volumes/stream/Pictures Stream/2026/_photography projects 2026-stream/As_Astrophotography 2026-Stream"
label = "Stream (2026 working volume)"
role  = "working"

[[library]]
id    = "peak"
path  = "/Volumes/peak/Pictures/Astrophotography/Astrophotography Library"
label = "Peak (lifetime archive on Synology)"
role  = "archive"
